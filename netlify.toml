# Netlify configuration for the Astro (static + Keystatic) site.
[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

# Security + caching headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Frame-Options = "SAMEORIGIN"

[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# --- Redirects from the old WordPress URLs (preserve SEO + inbound links) ---
# Adjust/extend with the real old permalinks once the WP export is mapped.
[[redirects]]
  from = "/blog/*"
  to = "/actualitat/:splat"
  status = 301

[[redirects]]
  from = "/receptes/*"
  to = "/actualitat/receptes/:splat"
  status = 301

[[redirects]]
  from = "/es/blog/*"
  to = "/es/actualitat/:splat"
  status = 301

# Member portal / online shop live in an external system.
[[redirects]]
  from = "/botiga"
  to = "https://botiga.foodcoopbcn.cat/"
  status = 302
  force = true
